name: Robô da Balança Comercial (Atualização Mensal)

on:
  schedule:
    # Roda automaticamente no dia 10 de cada mês às 09:00 da manhã (UTC)
    # Motivo: Dar tempo do governo fechar os dados do mês anterior
    - cron: '0 9 10 * *'
  workflow_dispatch: # Cria um botão no GitHub para você rodar manualmente quando quiser

jobs:
  atualizar-arquivos:
    runs-on: ubuntu-latest # O GitHub liga um PC com Linux temporário
    permissions:
      contents: write # Dá permissão para o robô salvar os dados na sua pasta

    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4

      - name: ⚙️ Instalar e configurar a linguagem R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: 📦 Instalar as bibliotecas (basedosdados, dplyr, arrow)
        run: |
          install.packages(c("basedosdados", "dplyr", "arrow"))
        shell: Rscript {0}

      - name: 🔑 Autenticar no Google Cloud (Usando a chave secreta)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 🚀 Executar o seu script de extração
        run: Rscript atualizar_dados.R

      - name: 💾 Salvar o arquivo .parquet na pasta do repositório
        run: |
          git lfs install
          git lfs track "dados/*.parquet"
          git add .gitattributes
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/*.parquet
          git commit -m "🤖 [Auto] Dados mensais da Balança Comercial" || echo "Sem mudanças"
          git push
