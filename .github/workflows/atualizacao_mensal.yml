name: Atualização Mensal de Dados (Balança Comercial)

on:
  schedule:
    # Roda automaticamente no dia 10 de cada mês às 09:00 da manhã (UTC)
    - cron: '0 9 10 * *'
  workflow_dispatch: # Cria um botão no GitHub para rodar manualmente quando quiser

jobs:
  atualizar-arquivos:
    runs-on: ubuntu-latest # O GitHub liga um PC com Linux temporário
    permissions:
      contents: write # Dá permissão para salvar os dados na pasta

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MEU_PAT_GITHUB }}

      - name: Ignorar o renv temporariamente na nuvem
        run: rm -f .Rprofile

      - name: Instalar e configurar a linguagem R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar as bibliotecas (basedosdados, dplyr, arrow)
        run: |
          install.packages(c("basedosdados", "dplyr", "arrow"))
        shell: Rscript {0}

      - name: Autenticar no Google Cloud (Usando a chave secreta)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Executar o script de extração
        run: Rscript atualizar_dados.R

      - name: Salvar o arquivo .parquet na pasta do repositório
        run: |
          git lfs install
          git lfs track "dados/*.parquet"
          git add .gitattributes
          git config --local user.name "mistervel12"
          git config --local user.email "williamcutrim9@gmail.com"
          git add dados/*.parquet
          git commit -m "[Auto] Dados mensais da Balança Comercial" || echo "Sem mudanças"
          git push https://${{ secrets.MEU_PAT_GITHUB }}@github.com/mistervel12/dashboard_balanca_comercial.git HEAD:master
          
